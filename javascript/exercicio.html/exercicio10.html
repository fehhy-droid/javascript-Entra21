<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Inversor de Texto</title>
</head>
<body>

    <h1>Inversor de Texto</h1>

    <label>Digite uma frase</label>
    <input id="frase" type="text">

    <br><br>

    <button onclick="inverter()">Inverter</button>

    <h2 id="resultado"></h2>

    <script>

        function inverter() {

            let frase = document.getElementById("frase").value;

            let invertida = "";

            for (let i = frase.length - 1; i >= 0; i--) {

                invertida += frase[i];

            }

            document.getElementById("resultado").innerHTML =
                invertida;

        }

    </script>

</body>
</html>
