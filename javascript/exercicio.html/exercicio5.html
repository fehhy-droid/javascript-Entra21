<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Verificador de Triângulo</title>
</head>
<body>

    <h1>Verificador de Triângulo</h1>

    <label>Lado 1</label>
    <input id="lado1" type="number">

    <br><br>

    <label>Lado 2</label>
    <input id="lado2" type="number">

    <br><br>

    <label>Lado 3</label>
    <input id="lado3" type="number">

    <br><br>

    <button onclick="verificar()">Verificar</button>

    <h2 id="resultado"></h2>

    <script>

        function verificar() {

            let lado1 = Number(document.getElementById("lado1").value);
            let lado2 = Number(document.getElementById("lado2").value);
            let lado3 = Number(document.getElementById("lado3").value);

            let resultado = document.getElementById("resultado");

            if (
                lado1 + lado2 > lado3 &&
                lado1 + lado3 > lado2 &&
                lado2 + lado3 > lado1
            ) {

                if (lado1 == lado2 && lado2 == lado3) {
                    resultado.innerHTML = "Triângulo Equilátero";
                }

                else if (
                    lado1 == lado2 ||
                    lado1 == lado3 ||
                    lado2 == lado3
                ) {
                    resultado.innerHTML = "Triângulo Isósceles";
                }

                else {
                    resultado.innerHTML = "Triângulo Escaleno";
                }

            } else {
                resultado.innerHTML = "Os lados não formam um triângulo";
            }

        }

    </script>

</body>
</html>
